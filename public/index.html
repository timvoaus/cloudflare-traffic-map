<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traffic Destination Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <!-- Toolbar -->
    <header class="toolbar">
      <div class="toolbar-left">
        <div class="logo-icon" title="Cloudflare">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.5 16.5H6c-2.2 0-4-1.8-4-4 0-2.1 1.6-3.8 3.7-4 .5-2.5 2.7-4.4 5.3-4.4 2.3 0 4.3 1.5 5.1 3.6.4-.1.8-.2 1.3-.2 2.2 0 4 1.8 4 4 0 .3 0 .6-.1.9.8.3 1.4 1.1 1.4 2 0 1.2-1 2.1-2.1 2.1H16.5z"/>
          </svg>
        </div>
        <div class="title">Traffic Destination Map</div>
        <span class="badge" id="updated-badge">Loading...</span>
      </div>
      <div class="toolbar-right">
        <button class="ctrl-btn" id="btn-refresh" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        </button>
        <button class="ctrl-btn" id="btn-theme" title="Toggle theme">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </div>
    </header>

    <!-- Map -->
    <div class="map-wrap">
      <svg id="world-map"></svg>
      <canvas id="comet-canvas" aria-hidden="true"></canvas>
      <div class="tooltip" id="tooltip"></div>

      <div class="zoom-btns">
        <button class="ctrl-btn" id="zoom-in" title="Zoom in" aria-label="Zoom in">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="ctrl-btn" id="zoom-out" title="Zoom out" aria-label="Zoom out">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="ctrl-btn" id="zoom-reset" title="Reset view" aria-label="Reset view">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
      </div>

      <div class="route-legend" id="route-legend" hidden>
        <div class="route-legend-title">Origin countries</div>
        <div class="map-key">
          <div class="legend-item"><svg class="legend-pin" width="12" height="15" viewBox="-2 -2 24 28" aria-hidden="true"><path d="M10 23 C10 23 0 15 0 8 A10 10 0 1 1 20 8 C20 15 10 23 10 23 Z" fill="currentColor"/><circle cx="10" cy="8" r="3.2" fill="white"/></svg>Origin</div>
          <div class="legend-item"><span class="dot dest"></span>Destination</div>
        </div>
        <div class="route-legend-list" id="route-legend-list"></div>
        <div class="route-legend-divider"></div>
        <div class="route-legend-subtitle">Destination countries</div>
        <div class="route-legend-list dest-legend-list" id="dest-legend-list"></div>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>Loading traffic data...</div>
      </div>

      <div class="error" id="error" hidden>
        <strong>Failed to load data</strong>
        <p id="error-msg">Unknown error</p>
      </div>
    </div>

    <!-- Stats -->
    <footer class="stats">
      <div class="stat">
        <span class="stat-label">Origins</span>
        <span class="stat-value" id="stat-origins">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Destinations</span>
        <span class="stat-value" id="stat-dests">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Routes</span>
        <span class="stat-value" id="stat-routes">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Total Queries</span>
        <span class="stat-value" id="stat-total">0</span>
      </div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script src="./script.js"></script>
</body>
</html>
